version: 2
project_name: komodor-klaudia-sync

before:
  hooks:
    - go mod tidy
    - go mod download
    - go test ./...
    - go generate ./...

builds:
  - id: komodor-klaudia-sync
    binary: klaudia-sync
    main: ./cmd/klaudia-sync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/davidcollom/komodor-klaudia-sync/internal/version.Version={{.Version}}
      - -X github.com/davidcollom/komodor-klaudia-sync/internal/version.Commit={{.Commit}}
      - -X github.com/davidcollom/komodor-klaudia-sync/internal/version.Date={{.Date}}

archives:
  - id: binaries
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

dockers_v2:
  - images:
      - ghcr.io/davidcollom/komodor-klaudia-sync
    platforms:
      - linux/arm64
      - linux/amd64
    tags:
      - v{{ .Version }}
      - v{{ .Major }}
      - v{{ .Major }}.{{ .Minor }}
      - "{{ if not .Prerelease }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "komodor-klaudia-sync"
      org.opencontainers.image.source: "https://github.com/davidcollom/komodor-klaudia-sync"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"

release:
  draft: false
  replace_existing_draft: true
  mode: replace

changelog:
  use: github
  sort: asc

signs:
  - artifacts: all
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
